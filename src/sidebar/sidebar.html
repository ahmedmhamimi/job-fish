<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Fish</title>
  <link rel="stylesheet" href="sidebar.css" />
  <script src="../lib/jszip.min.js"></script>
  <script src="../lib/jspdf.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M24 6C24 6 27 9 27 13C27 17 23 19 19 19C15 19 11 17 8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 14C6 12 5.5 9 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="7" cy="6.5" r="1.5" fill="currentColor"/>
        <path d="M24 6L24 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="16" cy="23" rx="5" ry="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M21 23L25 20M21 23L25 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="13.5" cy="22.5" r="0.75" fill="currentColor"/>
      </svg>
      <span class="brand-name">Job Fish</span>
      <span class="brand-tag">ATS</span>
    </div>
    <div class="header-actions">
      <!-- Theme toggle -->
      <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">
        <!-- Sun icon (shown in dark mode, click → light) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 2V4M12 20V22M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M2 12H4M20 12H22M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <!-- Moon icon (shown in light mode, click → dark) -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <!-- Settings toggle -->
      <button class="icon-btn settings-toggle" id="settingsToggle"
              aria-label="Open settings" aria-expanded="false" aria-controls="settingsDrawer">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M19.4 15C19.2669 15.3016 19.2272 15.6362 19.286 15.9606C19.3448 16.285 19.4995 16.5843 19.73 16.82L19.79 16.88C19.976 17.0657 20.1235 17.2863 20.2241 17.5291C20.3248 17.7719 20.3766 18.0322 20.3766 18.295C20.3766 18.5578 20.3248 18.8181 20.2241 19.0609C20.1235 19.3037 19.976 19.5243 19.79 19.71C19.6043 19.896 19.3837 20.0435 19.1409 20.1441C18.8981 20.2448 18.6378 20.2966 18.375 20.2966C18.1122 20.2966 17.8519 20.2448 17.6091 20.1441C17.3663 20.0435 17.1457 19.896 16.96 19.71L16.9 19.65C16.6643 19.4195 16.365 19.2648 16.0406 19.206C15.7162 19.1472 15.3816 19.1869 15.08 19.32C14.7842 19.4468 14.532 19.6572 14.3543 19.9255C14.1766 20.1938 14.0813 20.5082 14.08 20.83V21C14.08 21.5304 13.8693 22.0391 13.4942 22.4142C13.1191 22.7893 12.6104 23 12.08 23C11.5496 23 11.0409 22.7893 10.6658 22.4142C10.2907 22.0391 10.08 21.5304 10.08 21V20.91C10.0723 20.579 9.96512 20.258 9.77251 19.9887C9.5799 19.7194 9.31074 19.5143 9 19.4C8.69838 19.2669 8.36381 19.2272 8.03941 19.286C7.71502 19.3448 7.41568 19.4995 7.18 19.73L7.12 19.79C6.93425 19.976 6.71368 20.1235 6.47088 20.2241C6.22808 20.3248 5.96783 20.3766 5.705 20.3766C5.44217 20.3766 5.18192 20.3248 4.93912 20.2241C4.69632 20.1235 4.47575 19.976 4.29 19.79C4.10405 19.6043 3.95653 19.3837 3.85588 19.1409C3.75523 18.8981 3.70343 18.6378 3.70343 18.375C3.70343 18.1122 3.75523 17.8519 3.85588 17.6091C3.95653 17.3663 4.10405 17.1457 4.29 16.96L4.35 16.9C4.58054 16.6643 4.73519 16.365 4.794 16.0406C4.85282 15.7162 4.81312 15.3816 4.68 15.08C4.55324 14.7842 4.34276 14.532 4.07447 14.3543C3.80618 14.1766 3.49179 14.0813 3.17 14.08H3C2.46957 14.08 1.96086 13.8693 1.58579 13.4942C1.21071 13.1191 1 12.6104 1 12.08C1 11.5496 1.21071 11.0409 1.58579 10.6658C1.96086 10.2907 2.46957 10.08 3 10.08H3.09C3.42099 10.0723 3.742 9.96512 4.01133 9.77251C4.28066 9.5799 4.48574 9.31074 4.6 9C4.73312 8.69838 4.77282 8.36381 4.714 8.03941C4.65519 7.71502 4.50054 7.41568 4.27 7.18L4.21 7.12C4.02405 6.93425 3.87653 6.71368 3.77588 6.47088C3.67523 6.22808 3.62343 5.96783 3.62343 5.705C3.62343 5.44217 3.67523 5.18192 3.77588 4.93912C3.87653 4.69632 4.02405 4.47575 4.21 4.29C4.39575 4.10405 4.61632 3.95653 4.85912 3.85588C5.10192 3.75523 5.36217 3.70343 5.625 3.70343C5.88783 3.70343 6.14808 3.75523 6.39088 3.85588C6.63368 3.95653 6.85425 4.10405 7.04 4.29L7.1 4.35C7.33568 4.58054 7.63502 4.73519 7.95941 4.794C8.28381 4.85282 8.61838 4.81312 8.92 4.68H9C9.29577 4.55324 9.54802 4.34276 9.72569 4.07447C9.90337 3.80618 9.99872 3.49179 10 3.17V3C10 2.46957 10.2107 1.96086 10.5858 1.58579C10.9609 1.21071 11.4696 1 12 1C12.5304 1 13.0391 1.21071 13.4142 1.58579C13.7893 1.96086 14 2.46957 14 3V3.09C14.0013 3.41179 14.0966 3.72618 14.2743 3.99447C14.452 4.26276 14.7042 4.47324 15 4.6C15.3016 4.73312 15.6362 4.77282 15.9606 4.714C16.285 4.65519 16.5843 4.50054 16.82 4.27L16.88 4.21C17.0657 4.02405 17.2863 3.87653 17.5291 3.77588C17.7719 3.67523 18.0322 3.62343 18.295 3.62343C18.5578 3.62343 18.8181 3.67523 19.0609 3.77588C19.3037 3.87653 19.5243 4.02405 19.71 4.21C19.896 4.39575 20.0435 4.61632 20.1441 4.85912C20.2448 5.10192 20.2966 5.36217 20.2966 5.625C20.2966 5.88783 20.2448 6.14808 20.1441 6.39088C20.0435 6.63368 19.896 6.85425 19.71 7.04L19.65 7.1C19.4195 7.33568 19.2648 7.63502 19.206 7.95941C19.1472 8.28381 19.1869 8.61838 19.32 8.92V9C19.4468 9.29577 19.6572 9.54802 19.9255 9.72569C20.1938 9.90337 20.5082 9.99872 20.83 10H21C21.5304 10 22.0391 10.2107 22.4142 10.5858C22.7893 10.9609 23 11.4696 23 12C23 12.5304 22.7893 13.0391 22.4142 13.4142C22.0391 13.7893 21.5304 14 21 14H20.91C20.5882 14.0013 20.2738 14.0966 20.0055 14.2743C19.7372 14.452 19.5268 14.7042 19.4 15Z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Resume Missing Banner ────────────────────────────────── -->
  <button class="resume-banner is-hidden" id="resumeBanner" aria-label="Open settings to add your resume">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 9V13M12 17H12.01M10.29 3.86L1.82 18C1.64 18.32 1.54 18.68 1.54 19.05C1.54 19.42 1.64 19.78 1.82 20.1C2 20.42 2.27 20.69 2.59 20.87C2.91 21.05 3.27 21.15 3.64 21.15H20.36C20.73 21.15 21.09 21.05 21.41 20.87C21.73 20.69 22 20.42 22.18 20.1C22.36 19.78 22.46 19.42 22.46 19.05C22.46 18.68 22.36 18.32 22.18 18L13.71 3.86C13.53 3.54 13.26 3.27 12.94 3.09C12.62 2.91 12.26 2.82 11.9 2.82C11.54 2.82 11.18 2.91 10.86 3.09C10.54 3.27 10.27 3.54 10.09 3.86" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    No resume saved — add one to get started
    <span class="resume-banner-action">Open Settings →</span>
  </button>

  <!-- ── Main Panel ───────────────────────────────────────────── -->
  <main class="main-panel" id="mainPanel">

    <!-- Step 1: Job Description -->
    <div class="step-card">
      <div class="step-label">
        <span class="step-number">1</span>
        Target Job Description
      </div>
      <textarea class="field-textarea field-textarea--main" id="jobDescription"
                placeholder="Paste the full job description here — the more detail, the better your match score…"
                spellcheck="false" autocorrect="off"></textarea>
    </div>

    <!-- Step 2: Analyze -->
    <div class="action-zone">
      <div class="analyze-btn-wrap">
        <button class="btn btn-analyze" id="analyzeBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 11H14M11 8V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Analyze &amp; Optimize
        </button>
      </div>

      <div class="download-row">
        <button class="btn btn-success" id="downloadDocxBtn" disabled aria-disabled="true">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 2V8H20M12 18V12M9 15L12 18L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          DOCX
        </button>
        <button class="btn btn-success" id="downloadPdfBtn" disabled aria-disabled="true">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 2V8H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9 13H10.5C11.33 13 12 13.67 12 14.5C12 15.33 11.33 16 10.5 16H9V18M15 13V18M15 13H17M15 16H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          PDF
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="loadingState" aria-hidden="true" aria-live="polite">
      <div class="loading-ring">
        <svg viewBox="0 0 56 56" fill="none" aria-hidden="true">
          <circle class="loading-ring-track" cx="28" cy="28" r="22" stroke-width="5"/>
          <circle class="loading-ring-fill"  cx="28" cy="28" r="22" stroke-width="5"
                  stroke-dasharray="138" stroke-dashoffset="100"/>
        </svg>
      </div>
      <p class="loading-text">Optimizing your resume…</p>
      <p class="loading-subtext">Gemini is matching your skills to the job description. Usually 15–30 s.</p>
    </div>

    <!-- Output -->
    <section class="output-section" id="outputSection"
             aria-label="Optimization results" aria-live="polite"></section>

  </main>
</div>

<!-- ── Drawer scrim ───────────────────────────────────────────── -->
<div class="drawer-scrim" id="drawerScrim" aria-hidden="true"></div>

<!-- ── Settings Drawer ───────────────────────────────────────── -->
<aside class="settings-drawer" id="settingsDrawer" aria-label="Settings" role="complementary">
  <div class="drawer-header">
    <span class="drawer-title">Settings</span>
    <button class="drawer-close" id="drawerClose" aria-label="Close settings">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="drawer-body">

    <!-- API Key -->
    <div class="field-group">
      <label class="field-label" for="apiKeyInput">Gemini API Key</label>
      <p class="field-hint">Get yours free at <strong>aistudio.google.com</strong></p>
      <div class="input-row">
        <input class="field-input" type="password" id="apiKeyInput"
               placeholder="AIza…" autocomplete="off" spellcheck="false" />
        <button class="icon-btn reveal-btn" id="revealApiKey"
                aria-label="Show or hide API key" aria-pressed="false">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <svg class="eye-closed" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12A18.45 18.45 0 015.06 5.06M9.9 4.24A9.12 9.12 0 0112 4C19 4 23 12 23 12A18.5 18.5 0 0120.71 15.68M1 1L23 23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="field-actions">
        <button class="btn btn-secondary btn-sm" id="saveApiKey">Save Key</button>
        <span class="status-indicator" id="apiKeyStatus" aria-live="polite"></span>
      </div>
    </div>

    <!-- Model -->
    <div class="field-group">
      <label class="field-label" for="modelSelect">Model</label>
      <select class="field-select" id="modelSelect"></select>
    </div>

    <!-- ATS Target -->
    <div class="field-group">
      <div class="slider-header">
        <label class="field-label" for="matchSlider">Target Match Score</label>
        <span class="slider-value" id="sliderValue" aria-live="polite">82%</span>
      </div>
      <input class="slider" type="range" id="matchSlider"
             min="70" max="95" step="1" value="82"
             aria-valuemin="70" aria-valuemax="95" aria-valuenow="82" />
      <div class="slider-ticks">
        <span>70% Safe</span><span>82% Ideal</span><span>95% Max</span>
      </div>
    </div>

    <!-- Resume -->
    <div class="field-group">
      <label class="field-label">Resume</label>
      <input type="file" id="resumeFileInput" accept=".docx" class="file-input-hidden" />
      <button class="btn btn-secondary upload-trigger" id="uploadResumeBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M17 8L12 3L7 8M12 3V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Upload .docx
      </button>
      <span class="status-indicator" id="uploadStatus" aria-live="polite"></span>
      <label class="field-label" for="baseResume" style="margin-top:4px">or paste plain text</label>
      <textarea class="field-textarea field-textarea--settings" id="baseResume"
                placeholder="Paste resume text, or upload a .docx above…"
                spellcheck="false" autocorrect="off"></textarea>
      <div class="field-actions">
        <button class="btn btn-secondary btn-sm" id="saveResume">Save Resume</button>
        <span class="status-indicator" id="resumeStatus" aria-live="polite"></span>
      </div>
    </div>

  </div>
</aside>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<script type="module" src="sidebar.js"></script>
</body>
</html>
